name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: crawler

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -race ./...

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o fetcher ./cmd/server

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          # Copy binary trước khi chạy lệnh
          script_stop: true
          script: |
            mkdir -p /home/nightowl/nightowl-fetcher

      - name: Copy binary to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: fetcher
          target: /home/nightowl/nightowl-fetcher/

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e

            # Backup binary cũ để rollback
            DEPLOY_DIR=/home/nightowl/nightowl-fetcher
            if [ -f "$DEPLOY_DIR/fetcher.prev" ]; then
              rm -f "$DEPLOY_DIR/fetcher.prev"
            fi
            if [ -f "$DEPLOY_DIR/fetcher" ]; then
              cp "$DEPLOY_DIR/fetcher" "$DEPLOY_DIR/fetcher.prev"
            fi
            mv "$DEPLOY_DIR/fetcher" "$DEPLOY_DIR/fetcher"
            chmod +x "$DEPLOY_DIR/fetcher"

            # Restart systemd service (nightowl user cần sudo quyền restart service này)
            sudo systemctl restart nightowl-fetcher

            # Health check
            sleep 5
            curl -sf http://localhost:8080/health \
              || { sudo journalctl -u nightowl-fetcher -n 50 --no-pager; exit 1; }

            echo "Deploy OK — commit ${{ github.sha }}"
