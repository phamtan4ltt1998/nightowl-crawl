name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: crawler

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test -race ./...

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o fetcher ./cmd/server

      - name: Backup current binary
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            DEPLOY_DIR=/home/nightowl/nightowl-fetcher
            mkdir -p "$DEPLOY_DIR"
            if [ -f "$DEPLOY_DIR/fetcher" ]; then
              cp "$DEPLOY_DIR/fetcher" "$DEPLOY_DIR/fetcher.prev"
            fi

      - name: Copy binary to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: fetcher
          target: /home/nightowl/nightowl-fetcher/
          strip_components: 0

      - name: Restart service and health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -e
            chmod +x /home/nightowl/nightowl-fetcher/fetcher
            sudo systemctl restart nightowl-fetcher
            sleep 5
            curl -sf http://localhost:8080/health \
              || { sudo journalctl -u nightowl-fetcher -n 50 --no-pager; exit 1; }
            echo "Deploy OK — commit ${{ github.sha }}"
